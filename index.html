<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私募管理人画像库 — 中信建投财富</title>
    <style>
        :root {
            --primary-red: #B22222;
            --dark-red: #8B0000;
            --light-red: #FDF2F2;
            --accent-red: #C41E3A;
            --text-dark: #1F1F1F;
            --text-gray: #4A4A4A;
            --text-light: #6B7280;
            --bg-white: #FFFFFF;
            --bg-gray: #F8F9FA;
            --border-light: #E5E7EB;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(178,34,34,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--bg-gray);
            color: var(--text-dark);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            color: white;
            padding: 50px 40px 45px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }

        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header-sub {
            font-size: 15px;
            opacity: 0.85;
            position: relative;
            z-index: 1;
        }

        .header-date {
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }

        /* Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* Section Title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-left: 4px;
        }

        .section-title .icon {
            width: 36px;
            height: 36px;
            background: var(--primary-red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark-red);
        }

        .section-title .count {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 400;
            margin-left: 8px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--dark-red), var(--primary-red));
        }

        .card-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-name .status {
            width: 8px;
            height: 8px;
            background: #22C55E;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            font-size: 11px;
            background: var(--light-red);
            color: var(--primary-red);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .card-body {
            padding: 18px 24px;
        }

        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat {
            background: var(--bg-gray);
            padding: 12px 14px;
            border-radius: 10px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-red);
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.7;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 0 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-btn {
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .card-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .card-update {
            font-size: 12px;
            color: var(--text-light);
        }

        /* Add New Card Placeholder */
        .card-add {
            background: var(--bg-white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 2px dashed var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            min-height: 280px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-light);
        }

        .card-add:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
            background: var(--light-red);
        }

        .card-add-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .card-add-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Disclaimer */
        .disclaimer {
            background: #FAFAFA;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 24px 28px;
            text-align: center;
            margin-top: 40px;
        }

        .disclaimer-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .disclaimer p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 40px 24px 35px; }
            .header h1 { font-size: 24px; }
            .cards-grid { grid-template-columns: 1fr; }
            .container { padding: 24px 16px 40px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
    </style>
<base target="_blank">
</head>

</html>
